<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Local Shop</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
color:#333;
}

/* HERO */
.hero{
height:100vh;
background:url('https://www.magnific.com/premium-photo/related-national-thrift-shop-day_260745879.htm#fromView=keyword&page=1&position=8&uuid=cede17e3-d81c-4a91-a09a-21f1bb6a3c77&query=Shop');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.5);
}

.hero-content{
position:relative;
color:white;
padding:20px;
}

.hero h1{
font-size:3rem;
margin-bottom:15px;
}

.hero p{
font-size:1.2rem;
margin-bottom:20px;
}

.hero button{
padding:15px 30px;
background:#ff6600;
border:none;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

/* PRODUCTS */
.products{
padding:40px 20px;
}

.products h2{
text-align:center;
margin-bottom:20px;
}

.carousel{
display:flex;
overflow-x:auto;
gap:20px;
scroll-behavior:smooth;
padding-bottom:10px;
}

.card{
min-width:280px;
background:white;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
overflow:hidden;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card h3{
margin-bottom:10px;
}

.card ul{
margin-left:18px;
margin-bottom:10px;
}

.card button{
width:100%;
padding:12px;
border:none;
background:#28a745;
color:white;
border-radius:8px;
cursor:pointer;
}

/* CART */
.order-section{
background:white;
margin:30px 20px;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
}

.send-btn{
width:100%;
padding:15px;
background:#ff6600;
color:white;
border:none;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

/* Whatsapp */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:white;
text-decoration:none;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

@media(max-width:768px){
.hero h1{
font-size:2rem;
}
}
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>The Local Shop</h1>
<p>Fresh Finds, Best Prices</p>

<button onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">
Shop Now
</button>

</div>
</section>

<!-- PRODUCTS -->
<section class="products" id="products">

<h2>Products</h2>

<div class="carousel">

<div class="card">
<img src="https://i.ibb.co/35z1PL8x/Snapchat-429208249.jpg">

<div class="card-content">
<h3>General Grocery Pack</h3>

<p><b>Phone:</b> 9999999999</p>

<ul>
<li>Rice</li>
<li>Oil</li>
<li>Sugar</li>
<li>Soap</li>
</ul>

<button onclick="addCart('General Grocery Pack')">
Add To Cart
</button>

</div>
</div>


<div class="card">
<img src="https://i.ibb.co/S74x9VYR/Screenshot-20260617-120819.jpg">

<div class="card-content">
<h3>Daily Essentials</h3>

<p><b>Phone:</b> 9999999999</p>

<ul>
<li>Biscuits</li>
<li>Tea</li>
<li>Milk</li>
<li>Salt</li>
</ul>

<button onclick="addCart('Daily Essentials')">
Add To Cart
</button>

</div>
</div>


<div class="card">
<img src="https://i.ibb.co/3mnKGYm2/Screenshot-20260617-120903.jpg">

<div class="card-content">
<h3>Home Needs</h3>

<p><b>Phone:</b> 9999999999</p>

<ul>
<li>Detergent</li>
<li>Shampoo</li>
<li>Toothpaste</li>
<li>Brush</li>
</ul>

<button onclick="addCart('Home Needs')">
Add To Cart
</button>

</div>
</div>

</div>

</section>

<!-- ORDER FORM -->
<section class="order-section">

<h2>Your Cart</h2>

<textarea id="cartItems" rows="5" readonly></textarea>

<input type="text" id="name" placeholder="Customer Name">

<input type="text" id="phone" placeholder="Phone Number">

<button class="send-btn" onclick="sendMail()">
Send Order
</button>

</section>

<!-- WHATSAPP -->
<a href="https://wa.me/9999999999" class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("YOUR_PUBLIC_KEY");

let cart=[];

function addCart(item){
cart.push(item);
document.getElementById("cartItems").value=cart.join(", ");
}

function sendMail(){

let params={
customer_name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
items:cart.join(", "),
owner_email:"thelocalshop@gmail.com"
};

emailjs.send(
"YOUR_SERVICE_ID",
"YOUR_TEMPLATE_ID",
params
)
.then(function(){
alert("Order Sent Successfully!");
});
}
</script>

</body>
</html>
